version: '3.8'

services:
  # 1. Your Django App Service
  web:
    build: .
    # Keep your existing command
    command: gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 1 --timeout 120
    
    # CHANGE: Use 'ports' instead of 'expose'
    # We map host port 8000 to container port 8000.
    # "127.0.0.1" ensures it is only accessible inside the Droplet (Secure),
    # so people can't bypass Nginx and go straight to http://IP:8000
    ports:
      - "127.0.0.1:8000:8000"
      
    env_file:
      - .env