# This is the name of your new automated workflow
name: Deploy to DigitalOcean Droplet

# This tells GitHub WHEN to run this automation.
# We'll run it on every push to the "main" branch.
on:
  push:
    branches:
      - main

# This defines the "job" that will run.
jobs:
  deploy:
    # This job will run on a fresh, temporary Ubuntu server
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your code
      # This pulls your new code (that you just pushed) onto the temporary server
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: SSH into your server and run the deployment commands
      # This is the "magic" part. It uses a pre-made Action.
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          # These pull the secrets we just saved in Step 1
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}

          # This is the list of commands to run on your droplet
          # It's the exact same manual process, but now automated!
          script: |
            cd ~/walpole-agent-backend

            # Pull latest code
            git fetch --all
            git reset --hard origin/main

            # Clean the directory BUT exclude core/data
            # We don't need to exclude .env anymore because we create it *after* this
            git clean -fdx -e core/data/

            # --- THIS IS THE NEW STEP ---
            # Create the .env file from our GitHub Secret
            echo "${{ secrets.DOT_ENV }}" > .env

            # Stop and remove old containers
            docker-compose down --rmi all -v --remove-orphans

            # Build everything from zero
            docker-compose build --no-cache

            # Start fresh containers
            docker-compose up -d

            # Clean up dangling images
            docker image prune -f
