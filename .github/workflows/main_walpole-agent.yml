# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - walpole-agent

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: walpole.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_24B7002DFF164FEC94CA73C4E0A7F881 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_AA97E2D3F06F45569CD90086D047F3E9 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: walpole.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_24B7002DFF164FEC94CA73C4E0A7F881 }}/walpole-backend:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D63FD77060D848C3BC79434ACF0FFFA6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_255233B91740428FB3CF82B79A1762B2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DF10EC8E0B2740FF995D618EA6E80408 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: "walpole-agent"
          slot-name: "Production"
          images: "walpole.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_24B7002DFF164FEC94CA73C4E0A7F881 }}/walpole-backend:${{ github.sha }}"
